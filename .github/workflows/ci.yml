name: continuous-integration
on:
  push:
  pull_request:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff format
      - run: uv run ruff check
      - run: uv run pytest


