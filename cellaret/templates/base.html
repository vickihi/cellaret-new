<!DOCTYPE html>
{% load tailwind_cli %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.ico' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>{% block title %}Cellaret{% endblock %}</title>
    {% tailwind_css %}
</head>

<body>
    <header class="site-header">
        <nav class="container mx-auto flex justify-between w-full">

            <a id="logo" href="{% url 'products:catalog' %}" class="brand">Cellaret</a>

            <div class="header-primary-nav">
                <a class="active" href="{% url 'products:catalog' %}">
                    <span>Catalog</span>
                </a>
                <a class="" href="#">
                    <span>Cellar</span>
                </a>
                <a class="" href="#">
                    <span>Sommelier</span>
                </a>
            </div>

            <div class="header-secondary-nav">
                <a href="#">log in</a>
                <a href="#">register</a>
                <div class="lang-select">
                    <a href="#" class="active">EN</a>
                    |
                    <a href="#">FR</a>
                </div>
            </div>

        </nav>
    </header>
    <main class="mx-auto">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer class="site-footer">
        <div class="container mx-auto py-5 text-center text-white">
            <p>&copy; {% now "Y" %} Cellaret. All rights reserved.</p>
        </div>
    </footer>
</body>
