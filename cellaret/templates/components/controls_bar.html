    <form method="GET" action="{{ search_action|default:'' }}" class="catalog-top-bar">
        <div class="results-text">
            {% if is_cellar %}
                {{ total_bottles }} Bottles in {{ cellar_name }}
            {% elif page_obj and page_obj.paginator.count > 0 %}
                Showing {{ page_obj.start_index }} to {{ page_obj.end_index }} of {{ page_obj.paginator.count }} results
            {% else %}
                No matching products found
            {% endif %}
        </div>

        <div class="controls-right">
            <div class="search-form">
                <label for="id_q" class="visually-hidden">Search products</label>
                <input 
                    type="text" 
                    name="q" 
                    id="id_q"
                    placeholder="{{ search_placeholder|default:'Search...' }}" 
                    value="{{ search_query }}"
                    class="search-input"
                >
                <button type="submit" aria-label="Search" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="v-line"></div>

            <div class="sort-group">
                <label for="{{ sort_form.sort.id_for_label }}" class="visually-hidden">
                    {{ sort_form.sort.label }}
                </label>
                {{ sort_form.sort }}
            </div>
            <button type="submit" class="sort-btn">Sort</button>
        </div>
    </form>
